name: Deploy GitHub Pages

# main에 푸시될 때마다 저장소 루트(정적 사이트)를 gh-pages 브랜치로 배포.
# gh-pages 브랜치 기반 Pages는 저장소 기본 토큰만으로 동작한다
# (Pages API 방식은 GITHUB_TOKEN 권한 부족으로 사이트 생성이 불가).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
